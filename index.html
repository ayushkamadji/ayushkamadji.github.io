  <script>
    document.addEventListener("DOMContentLoaded", function() {
      var cursorDOM = document.querySelector("#animated-cursor");

      var interval = setInterval(function() {
        var current = cursorDOM.innerHTML;
        cursorDOM.innerHTML = toggleSpaceAndBlock(current);
      }, 500);

      window.addEventListener("beforeunload", function() {
        clearInterval(interval);
      })
    })
    function toggleSpaceAndBlock(string) {
      return (string === "&nbsp;" ? "\u2588" : "&nbsp;");
    }
  </script>
